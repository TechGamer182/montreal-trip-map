name: Update Workflow

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: montreal-map-site
          path: ./
